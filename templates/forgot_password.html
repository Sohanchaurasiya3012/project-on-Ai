<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea, #764ba2);
            padding: 20px;
        }

        .box {
            width: 100%;
            max-width: 420px;
            background: white;
            padding: 30px;
            border-radius: 18px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }

        .box h1 {
            text-align: center;
            margin-bottom: 25px;
            color: #1f2937;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #374151;
        }

        .form-group input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #d1d5db;
            border-radius: 10px;
            font-size: 15px;
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: #4f46e5;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        .btn:hover {
            background: #4338ca;
        }

        .error-message {
            background: #fee2e2;
            color: #b91c1c;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            text-align: center;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 18px;
            text-decoration: none;
            color: #4f46e5;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>Reset Password</h1>

        {% if error %}
            <div class="error-message">{{ error }}</div>
        {% endif %}

        {% if step == 1 %}
            <form method="POST">
                <div class="form-group">
                    <label for="username">Enter Username</label>
                    <input type="text" name="username" id="username" placeholder="e.g. admin" required>
                </div>
                <button type="submit" class="btn">Next</button>
            </form>
        {% elif step == 2 %}
            <form method="POST">
                <input type="hidden" name="username" value="{{ username }}">
                <div class="form-group">
                    <p style="margin-bottom: 10px; color: #374151;"><strong>Security Question:</strong></p>
                    <p style="margin-bottom: 15px; color: #4b5563;">{{ question }}</p>
                    <label for="answer">Your Answer</label>
                    <input type="text" name="answer" id="answer" required>
                </div>
                <div class="form-group">
                    <label for="new_password">New Password</label>
                    <input type="password" name="new_password" id="new_password" required>
                </div>
                <div class="form-group">
                    <label for="confirm_password">Confirm New Password</label>
                    <input type="password" name="confirm_password" id="confirm_password" required>
                </div>
                <button type="submit" class="btn">Reset Password</button>
            </form>
        {% endif %}

        <a href="{{ url_for('admin_login') }}" class="back-link">← Back to Login</a>
    </div>
</body>
</html>
